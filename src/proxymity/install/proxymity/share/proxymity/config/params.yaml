# proxymity configuration — Proximity sensor on Jetson Orin Nano
#
# Jetson Orin Nano 40-pin header reference:
#   Pin 9  = GND         (sensor ground)
#   Pin 11 = GPIO11      (default TRIG / OUT)
#   Pin 12 = GPIO12      (default ECHO)
#
# Sensor types: "hcsr04" (ultrasonic) or "l18d80" (IR obstacle)

/**:
  ros__parameters:
    # Common
    sensor_type: "l18d80"        # "hcsr04" or "l18d80"
    gpio_chip: "/dev/gpiochip0"
    publish_rate_hz: 10.0
    simulate: false
    obstacle_threshold_cm: 20.0
    obstacle_on_delay: 0.0
    obstacle_off_delay: 0.0
    oscillation_window: 1.0
    oscillation_max_toggles: 3

    # Range message fields
    frame_id: "proximity_link"
    field_of_view: 0.261799      # ~15 degrees in radians
    min_range: 0.02              # 2 cm
    max_range: 4.0               # 4 m

    # HC-SR04 (ultrasonic distance)
    trigger_pin: 11
    echo_pin: 12

    # L18D80 (IR obstacle)
    out_pin: 144
    active_low: true             # LOW = obstacle for L18D80

