# proxymity configuration — HC-SR04 proximity sensor on Jetson Orin Nano
#
# Jetson Orin Nano 40-pin header reference:
#   Pin 9  = GND         (sensor ground)
#   Pin 11 = GPIO11      (default TRIG)
#   Pin 12 = GPIO12      (default ECHO)
#
# Adjust trigger_pin / echo_pin based on your wiring.

/**:
  ros__parameters:
    trigger_pin: 11
    echo_pin: 12
    gpio_chip: "/dev/gpiochip0"
    publish_rate_hz: 10.0
    simulate: false
    frame_id: "proximity_link"
    radiation_type: 0          # 0=ultrasound, 1=infrared
    field_of_view: 0.261799    # ~15 degrees in radians
    min_range: 0.02            # 2 cm
    max_range: 4.0             # 4 m
